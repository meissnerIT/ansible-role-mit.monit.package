---
- name: Install monit
  ansible.builtin.package:
    name: monit

- name: Copy monit default configuration
  ansible.builtin.copy:
    src: monitrc
    dest: "{{ etc_prefix }}/etc/monitrc"
    mode: "0600"
  when: ansible_os_family == "FreeBSD"

- name: Copy monit configurations to {{ etc_prefix }}/etc/monit/conf.d/ # noqa: name[template]
  ansible.builtin.template:
    src: monit/{{ item }}
    dest: "{{ etc_prefix }}/etc/monit/conf.d/"
    mode: "0644"
  notify: Reload monit
  loop: "{{ monit_configs }}"
  when: monit_configs is defined

- name: Include inventory_hostname.yml
  ansible.builtin.include_tasks: "{{ tasks_file }}"
  when: tasks_file != ""
  vars:
    tasks_file: "{{ lookup('ansible.builtin.first_found', files, errors='ignore') }}"
    files:
      - "local/roles/{{ ansible_role_name }}/tasks/{{ inventory_hostname }}.yml"

- name: Enable and start monit
  ansible.builtin.service:
    name: monit
    state: started
    enabled: true
