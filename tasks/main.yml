---
- name: Install monit
  ansible.builtin.package:
    name: monit

- name: Copy monit default configuration
  ansible.builtin.copy:
    src: monitrc
    dest: "{{ install_prefix }}/etc/monitrc"
    mode: "0600"
  when: ansible_os_family == "FreeBSD"

- name: Copy monit configurations to {{ etc_prefix }}/etc/monit/conf.d/ # noqa: name[template]
  ansible.builtin.template:
    src: monit/{{ item }}
    dest: "{{ etc_prefix }}/etc/monit/conf.d/"
    mode: "0644"
  notify: Reload monit
  loop: "{{ monit_configs }}"
  when: monit_configs is defined

- name: Enable and start monit
  ansible.builtin.service:
    name: monit
    state: started
    enabled: true
